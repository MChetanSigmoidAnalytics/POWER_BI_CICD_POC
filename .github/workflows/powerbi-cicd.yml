name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1: DEPLOY TO DEV
  # ─────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/dev'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy All Reports to DEV
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"
          
          deploy_report() {
            local FILE=$1
            local NAME=$2
            echo "=== Deploying $NAME ==="
            RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$FILE")
            HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
            if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "202" ]]; then
              echo "::notice::$NAME deployed successfully"
            else
              echo "::error::$NAME deploy failed - Status: $HTTP_STATUS"; exit 1
            fi
          }
          
          deploy_report "reports/customer_sucess_report.pbix"  "CustomerSuccessReport"
          deploy_report "reports/Sales_Report_01.pbix"         "SalesReport01"
          deploy_report "reports/Sales_Report.pbix"            "SalesReport"
          deploy_report "reports/shippment_report.pbix"        "ShippmentReport"

      - name: TakeOver + Refresh Datasets
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"
          
          process_report() {
            local NAME=$1
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            if [ -z "$DATASET_ID" ] || [ "$DATASET_ID" == "null" ]; then echo "::error::Dataset not found: $NAME"; exit 1; fi
            
            curl -s -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" -H "Authorization: Bearer $TOKEN"
            curl -s -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{"notifyOption": "NoNotification"}'
          }
          
          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"

  # ─────────────────────────────
  # JOB 2: DEPLOY TO UAT
  # ─────────────────────────────
  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3
      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy All Reports to UAT
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.UAT_WORKSPACE_ID }}"
          # ... (Repeat deploy logic from DEV, but using UAT_WORKSPACE_ID)

  # ─────────────────────────────
  # JOB 3: DEPLOY TO PRD
  # ─────────────────────────────
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd
    needs: deploy-uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3
      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: TakeOver + Bind Cloud Connection + Refresh
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.PRD_WORKSPACE_ID }}"
          CONNECTION_ID="${{ secrets.PRD_CONNECTION_ID }}"

          process_report() {
            local NAME=$1
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            
            if [ -z "$DATASET_ID" ] || [ "$DATASET_ID" == "null" ]; then
              echo "::error::Dataset not found: $NAME"
              exit 1
            fi

            # 1. TakeOver
            curl -s -o /dev/null -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" -H "Authorization: Bearer $TOKEN"

            # 2. Bind to Shared Cloud Connection
            BIND_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{ \"gatewayObjectId\": \"00000000-0000-0000-0000-000000000000\", \"datasourceObjectIds\": [\"$CONNECTION_ID\"] }")
            
            # 3. Refresh
            curl -s -o /dev/null -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{"notifyOption": "NoNotification"}'
          }

          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"