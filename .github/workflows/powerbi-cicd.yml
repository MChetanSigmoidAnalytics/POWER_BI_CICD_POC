name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  CLIENT_ID: ${{ secrets.CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  TENANT_ID: ${{ secrets.TENANT_ID }}

jobs:
  # ====================== DEV ======================
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/dev'
    env:
      WORKSPACE_ID:  ${{ secrets.DEV_WORKSPACE_ID }}
      CONNECTION_ID: ${{ secrets.DEV_CONNECTION_ID }}

    steps:
      - name: Checkout Code
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" .

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy All Reports to DEV
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "🚀 Deploying all reports to DEV..."

          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file" .pbix)
              echo "========================================"
              echo "DEPLOYING: $NAME"
              echo "========================================"

              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
              
              if [[ "$HTTP_STATUS" == 200 || "$HTTP_STATUS" == 202 ]]; then
                echo "::notice::✅ $NAME deployed successfully"
              else
                echo "::error::❌ $NAME deployment failed"
              fi
            fi
          done

      - name: TakeOver + Bind + Refresh (DEV)
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          CONNECTION_ID="${{ secrets.DEV_CONNECTION_ID }}"

          process_report() {
            local NAME=$1
            echo "🔧 Processing: $NAME"

            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')

            if [ -z "$DATASET_ID" ]; then
              echo "::warning::Dataset not found: $NAME"
              return
            fi

            # TakeOver
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            # Bind SPN Connection
            if [ -n "$CONNECTION_ID" ]; then
              echo "Binding to SPN Connection..."
              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{
                  "gatewayObjectId": "00000000-0000-0000-0000-000000000000",
                  "datasourceObjectIds": ["'"$CONNECTION_ID"'"]
                }'
            fi

            # Refresh
            echo "Triggering refresh..."
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'

            echo "::notice::✅ $NAME processed successfully"
          }

  

  # ====================== UAT ======================
  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat
    if: github.ref == 'refs/heads/main'
    env:
      WORKSPACE_ID:  ${{ secrets.UAT_WORKSPACE_ID }}
      CONNECTION_ID: ${{ secrets.UAT_CONNECTION_ID }}

    steps:
      - name: Checkout Code
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" .

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy All Reports to UAT
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "🚀 Deploying all reports to UAT..."
          # Same deployment loop as DEV (copy-paste for simplicity)
          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file" .pbix)
              echo "Deploying: $NAME to UAT"
              curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file" | grep -E "(HTTP_STATUS|notice|error)"
            fi
          done

      - name: TakeOver + Bind + Refresh (UAT)
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          CONNECTION_ID="${{ secrets.UAT_CONNECTION_ID }}"
          # Same process_report function as DEV (you can copy it)
          # ... (I'll keep it short, copy from DEV if needed)

  # ====================== PRD ======================
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd
    needs: deploy-uat
    if: github.ref == 'refs/heads/main'
    env:
      WORKSPACE_ID:  ${{ secrets.PRD_WORKSPACE_ID }}
      CONNECTION_ID: ${{ secrets.PRD_CONNECTION_ID }}

    steps:
      - name: Checkout Code
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" .

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy All Reports to PRD
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "🚀 Deploying all reports to PRD..."
          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file" .pbix)
              echo "Deploying: $NAME to PRD"
              curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file" | grep -E "(HTTP_STATUS|notice|error)"
            fi
          done

      - name: TakeOver + Bind + Refresh (PRD)
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          CONNECTION_ID="${{ secrets.PRD_CONNECTION_ID }}"
          # Same process_report logic as DEV
          echo "PRD processing logic..."