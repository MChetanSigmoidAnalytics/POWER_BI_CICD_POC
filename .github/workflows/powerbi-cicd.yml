
name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

  workflow_dispatch:

jobs:

  # ====================== DEV ======================

  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    if: github.ref == 'refs/heads/dev'

    env:
      TENANT_ID: ${{ secrets.TENANT_ID }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy DEV Reports
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"
          SERVER_NAME="${{ secrets.DEV_DB_SERVER }}"
          DATABASE_NAME="${{ secrets.DEV_DB_NAME }}"

          for file in reports/*.pbix; do

            NAME=$(basename "$file" .pbix)

            echo "========================================"
            echo "DEPLOYING DEV: $NAME"
            echo "========================================"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$file"

            echo "Waiting for dataset..."
            sleep 40

            DATASET_ID=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg NAME "$NAME" \
              '.value[] | select(.name==$NAME) | .id')

            echo "Dataset ID: $DATASET_ID"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                    \"updateDetails\": [
                      {
                        \"name\": \"ServerName\",
                        \"newValue\": \"$SERVER_NAME\"
                      },
                      {
                        \"name\": \"DatabaseName\",
                        \"newValue\": \"$DATABASE_NAME\"
                      }
                    ]
                  }"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption":"NoNotification"}'

            echo "Refresh triggered for DEV: $NAME"

          done


  # ====================== UAT ======================

  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat

    needs: deploy-dev

    if: github.ref == 'refs/heads/main'

    env:
      TENANT_ID: ${{ secrets.TENANT_ID }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy UAT Reports
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.UAT_WORKSPACE_ID }}"
          SERVER_NAME="${{ secrets.UAT_DB_SERVER }}"
          DATABASE_NAME="${{ secrets.UAT_DB_NAME }}"

          for file in reports/*.pbix; do

            NAME=$(basename "$file" .pbix)

            echo "========================================"
            echo "DEPLOYING UAT: $NAME"
            echo "========================================"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$file"

            sleep 40

            DATASET_ID=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg NAME "$NAME" \
              '.value[] | select(.name==$NAME) | .id')

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                    \"updateDetails\": [
                      {
                        \"name\": \"ServerName\",
                        \"newValue\": \"$SERVER_NAME\"
                      },
                      {
                        \"name\": \"DatabaseName\",
                        \"newValue\": \"$DATABASE_NAME\"
                      }
                    ]
                  }"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption":"NoNotification"}'

            echo "Refresh triggered for UAT: $NAME"

          done


  # ====================== PRD ======================

  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd

    needs: deploy-uat

    if: github.ref == 'refs/heads/main'

    env:
      TENANT_ID: ${{ secrets.TENANT_ID }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy PRD Reports
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.PRD_WORKSPACE_ID }}"
          SERVER_NAME="${{ secrets.PRD_DB_SERVER }}"
          DATABASE_NAME="${{ secrets.PRD_DB_NAME }}"

          for file in reports/*.pbix; do

            NAME=$(basename "$file" .pbix)

            echo "========================================"
            echo "DEPLOYING PRD: $NAME"
            echo "========================================"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$file"

            sleep 40

            DATASET_ID=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg NAME "$NAME" \
              '.value[] | select(.name==$NAME) | .id')

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                    \"updateDetails\": [
                      {
                        \"name\": \"ServerName\",
                        \"newValue\": \"$SERVER_NAME\"
                      },
                      {
                        \"name\": \"DatabaseName\",
                        \"newValue\": \"$DATABASE_NAME\"
                      }
                    ]
                  }"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption":"NoNotification"}'

            echo "Refresh triggered for PRD: $NAME"

          done

