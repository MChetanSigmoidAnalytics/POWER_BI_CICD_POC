name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1: DEPLOY TO DEV
  # ─────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/dev'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify DEV Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.DEV_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cannot access DEV workspace"
            exit 1
          fi
          echo "::notice::Workspace verified: $(echo $BODY | jq -r '.name')"

      - name: Check PBIX Files
        run: |
          for file in \
            "reports/customer_sucess_report.pbix" \
            "reports/Sales_Report_01.pbix" \
            "reports/Sales_Report.pbix" \
            "reports/shippment_report.pbix"
          do
            if [ ! -f "$file" ]; then
              echo "::error::File not found: $file"
              exit 1
            fi
            echo "::notice::Found: $file"
          done

      - name: Deploy All Reports to DEV
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"

          deploy_report() {
            local FILE=$1
            local NAME=$2

            echo "=== Deploying $NAME ==="
            RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$FILE")

            HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
            BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

            case $HTTP_STATUS in
              200|202) echo "::notice::$NAME deployed - Import ID: $(echo $BODY | jq -r '.id')" ;;
              *) echo "::error::$NAME deploy failed - Status: $HTTP_STATUS"; exit 1 ;;
            esac
          }

          deploy_report "reports/customer_sucess_report.pbix"  "CustomerSuccessReport"
          deploy_report "reports/Sales_Report_01.pbix"          "SalesReport01"
          deploy_report "reports/Sales_Report.pbix"             "SalesReport"
          deploy_report "reports/shippment_report.pbix"         "ShippmentReport"

      - name: Update Parameters & Bind Connector for All Reports
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"

          # Lookup connector ID by name once
          CONNECTIONS=$(curl -s \
            -X GET "https://api.fabric.microsoft.com/v1/connections" \
            -H "Authorization: Bearer $TOKEN")

          CONNECTION_ID=$(echo $CONNECTIONS | jq -r \
            --arg name "${{ secrets.CONNECTOR_NAME }}" \
            '.value[] | select(.displayName==$name) | .id')

          if [ -z "$CONNECTION_ID" ]; then
            echo "::error::Connector not found: ${{ secrets.CONNECTOR_NAME }}"
            exit 1
          fi
          echo "::notice::Connector resolved: ${{ secrets.CONNECTOR_NAME }}"

          process_report() {
            local NAME=$1

            # Get dataset ID
            DATASET_ID=$(curl -s \
              -X GET "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" \
              -H "Authorization: Bearer $TOKEN" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')

            if [ -z "$DATASET_ID" ]; then
              echo "::error::Dataset not found: $NAME"
              exit 1
            fi
            echo "::notice::Processing: $NAME ($DATASET_ID)"

            # Update parameters
            PARAM_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "updateDetails": [
                  { "name": "ServerName",   "newValue": "${{ secrets.DB_SERVER }}" },
                  { "name": "DatabaseName", "newValue": "${{ secrets.DB_NAME }}" }
                ]
              }')

            case $PARAM_STATUS in
              200) echo "::notice::$NAME parameters updated" ;;
              *)   echo "::notice::$NAME parameter update skipped - Status: $PARAM_STATUS" ;;
            esac

            # Takeover datasource
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            # Get gateway ID
            GATEWAY_ID=$(curl -s \
              -X GET "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/datasources" \
              -H "Authorization: Bearer $TOKEN" | jq -r '.value[0].gatewayId')

            # Bind connector
            BIND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"gatewayObjectId\": \"$GATEWAY_ID\",
                \"datasourceObjectIds\": [\"$CONNECTION_ID\"]
              }")

            case $BIND_STATUS in
              200) echo "::notice::$NAME connector bound successfully" ;;
              *)   echo "::error::$NAME connector binding failed - Status: $BIND_STATUS"; exit 1 ;;
            esac

            # Trigger refresh
            REFRESH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}')

            case $REFRESH_STATUS in
              202) echo "::notice::$NAME refresh triggered" ;;
              *)   echo "::error::$NAME refresh failed - Status: $REFRESH_STATUS"; exit 1 ;;
            esac
          }

          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"

  # ─────────────────────────────
  # JOB 2: DEPLOY TO UAT
  # ─────────────────────────────
  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify UAT Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cannot access UAT workspace"
            exit 1
          fi
          echo "::notice::Workspace verified: $(echo $BODY | jq -r '.name')"

      - name: Check PBIX Files
        run: |
          for file in \
            "reports/customer_sucess_report.pbix" \
            "reports/Sales_Report_01.pbix" \
            "reports/Sales_Report.pbix" \
            "reports/shippment_report.pbix"
          do
            if [ ! -f "$file" ]; then
              echo "::error::File not found: $file"
              exit 1
            fi
            echo "::notice::Found: $file"
          done

      - name: Deploy All Reports to UAT
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.UAT_WORKSPACE_ID }}"

          deploy_report() {
            local FILE=$1
            local NAME=$2

            echo "=== Deploying $NAME ==="
            RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$FILE")

            HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
            BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

            case $HTTP_STATUS in
              200|202) echo "::notice::$NAME deployed - Import ID: $(echo $BODY | jq -r '.id')" ;;
              *) echo "::error::$NAME deploy failed - Status: $HTTP_STATUS"; exit 1 ;;
            esac
          }

          deploy_report "reports/customer_sucess_report.pbix"  "CustomerSuccessReport"
          deploy_report "reports/Sales_Report_01.pbix"          "SalesReport01"
          deploy_report "reports/Sales_Report.pbix"             "SalesReport"
          deploy_report "reports/shippment_report.pbix"         "ShippmentReport"

      - name: Update Parameters & Bind Connector for All Reports
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.UAT_WORKSPACE_ID }}"

          CONNECTIONS=$(curl -s \
            -X GET "https://api.fabric.microsoft.com/v1/connections" \
            -H "Authorization: Bearer $TOKEN")

          CONNECTION_ID=$(echo $CONNECTIONS | jq -r \
            --arg name "${{ secrets.CONNECTOR_NAME }}" \
            '.value[] | select(.displayName==$name) | .id')

          if [ -z "$CONNECTION_ID" ]; then
            echo "::error::Connector not found: ${{ secrets.CONNECTOR_NAME }}"
            exit 1
          fi
          echo "::notice::Connector resolved: ${{ secrets.CONNECTOR_NAME }}"

          process_report() {
            local NAME=$1

            DATASET_ID=$(curl -s \
              -X GET "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" \
              -H "Authorization: Bearer $TOKEN" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')

            if [ -z "$DATASET_ID" ]; then
              echo "::error::Dataset not found: $NAME"
              exit 1
            fi
            echo "::notice::Processing: $NAME"

            PARAM_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "updateDetails": [
                  { "name": "ServerName",   "newValue": "${{ secrets.DB_SERVER }}" },
                  { "name": "DatabaseName", "newValue": "${{ secrets.DB_NAME }}" }
                ]
              }')

            case $PARAM_STATUS in
              200) echo "::notice::$NAME parameters updated" ;;
              *)   echo "::notice::$NAME parameter update skipped - Status: $PARAM_STATUS" ;;
            esac

            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            GATEWAY_ID=$(curl -s \
              -X GET "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/datasources" \
              -H "Authorization: Bearer $TOKEN" | jq -r '.value[0].gatewayId')

            BIND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"gatewayObjectId\": \"$GATEWAY_ID\",
                \"datasourceObjectIds\": [\"$CONNECTION_ID\"]
              }")

            case $BIND_STATUS in
              200) echo "::notice::$NAME connector bound successfully" ;;
              *)   echo "::error::$NAME connector binding failed - Status: $BIND_STATUS"; exit 1 ;;
            esac

            REFRESH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}')

            case $REFRESH_STATUS in
              202) echo "::notice::$NAME refresh triggered" ;;
              *)   echo "::error::$NAME refresh failed - Status: $REFRESH_STATUS"; exit 1 ;;
            esac
          }

          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"

  # ─────────────────────────────
  # JOB 3: DEPLOY TO PRD
  # ─────────────────────────────
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd
    needs: deploy-uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify PRD Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.PRD_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cannot access PRD workspace"
            exit 1
          fi
          echo "::notice::Workspace verified: $(echo $BODY | jq -r '.name')"

      - name: Check PBIX Files
        run: |
          for file in \
            "reports/customer_sucess_report.pbix" \
            "reports/Sales_Report_01.pbix" \
            "reports/Sales_Report.pbix" \
            "reports/shippment_report.pbix"
          do
            if [ ! -f "$file" ]; then
              echo "::error::File not found: $file"
              exit 1
            fi
            echo "::notice::Found: $file"
          done

      - name: Deploy All Reports to PRD
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.PRD_WORKSPACE_ID }}"

          deploy_report() {
            local FILE=$1
            local NAME=$2

            echo "=== Deploying $NAME ==="
            RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$FILE")

            HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
            BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

            case $HTTP_STATUS in
              200|202) echo "::notice::$NAME deployed - Import ID: $(echo $BODY | jq -r '.id')" ;;
              *) echo "::error::$NAME deploy failed - Status: $HTTP_STATUS"; exit 1 ;;
            esac
          }

          deploy_report "reports/customer_sucess_report.pbix"  "CustomerSuccessReport"
          deploy_report "reports/Sales_Report_01.pbix"          "SalesReport01"
          deploy_report "reports/Sales_Report.pbix"             "SalesReport"
          deploy_report "reports/shippment_report.pbix"         "ShippmentReport"

      - name: Update Parameters & Bind Connector for All Reports
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.PRD_WORKSPACE_ID }}"

          CONNECTIONS=$(curl -s \
            -X GET "https://api.fabric.microsoft.com/v1/connections" \
            -H "Authorization: Bearer $TOKEN")

          CONNECTION_ID=$(echo $CONNECTIONS | jq -r \
            --arg name "${{ secrets.CONNECTOR_NAME }}" \
            '.value[] | select(.displayName==$name) | .id')

          if [ -z "$CONNECTION_ID" ]; then
            echo "::error::Connector not found: ${{ secrets.CONNECTOR_NAME }}"
            exit 1
          fi
          echo "::notice::Connector resolved: ${{ secrets.CONNECTOR_NAME }}"

          process_report() {
            local NAME=$1

            DATASET_ID=$(curl -s \
              -X GET "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" \
              -H "Authorization: Bearer $TOKEN" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')

            if [ -z "$DATASET_ID" ]; then
              echo "::error::Dataset not found: $NAME"
              exit 1
            fi
            echo "::notice::Processing: $NAME"

            PARAM_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "updateDetails": [
                  { "name": "ServerName",   "newValue": "${{ secrets.DB_SERVER }}" },
                  { "name": "DatabaseName", "newValue": "${{ secrets.DB_NAME }}" }
                ]
              }')

            case $PARAM_STATUS in
              200) echo "::notice::$NAME parameters updated" ;;
              *)   echo "::notice::$NAME parameter update skipped - Status: $PARAM_STATUS" ;;
            esac

            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            GATEWAY_ID=$(curl -s \
              -X GET "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/datasources" \
