name: Power BI Auth Test from azure to powerbi

on:
  push:
    branches:
      - main
    

jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get Token from Azure
        run: |
          TOKEN=$(curl -s -X POST https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "client_id=${{ secrets.CLIENT_ID }}&client_secret=${{ secrets.CLIENT_SECRET }}&grant_type=client_credentials&scope=https://analysis.windows.net/powerbi/api/.default" | jq -r '.access_token')
          
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Token fetch failed"
            exit 1
          fi
          
          echo "✅ Token fetched successfully"
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Verify Token against Power BI API
        run: |
          RESPONSE=$(curl -s -X GET "https://api.powerbi.com/v1.0/myorg/groups" \
          -H "Authorization: Bearer $TOKEN")
          
          echo "Power BI API Response: $RESPONSE"
          
          # Check if response has value field (means auth worked)
          if echo "$RESPONSE" | jq -e '.value' > /dev/null 2>&1; then
            echo "✅ Auth successful - Power BI API is accessible"
          else
            echo "❌ Auth failed - Check API response above"
            exit 1
          fi