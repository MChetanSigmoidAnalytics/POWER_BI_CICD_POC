name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1: DEPLOY TO DEV
  # push to dev → auto deploy
  # no approval needed
  # ─────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/dev'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify DEV Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.DEV_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Cannot access DEV workspace - Status: $HTTP_STATUS"
            exit 1
          fi

          echo "Workspace accessible: $(echo $BODY | jq -r '.name')"

      - name: Check PBIX File
        run: |
          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo "❌ PBIX file not found"
            exit 1
          fi
          echo " PBIX file found"

      - name: Deploy to DEV
        run: |
          echo "=== Deploying to DEV ==="

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.DEV_WORKSPACE_ID }}/imports?datasetDisplayName=CustomerSuccessReport&nameConflict=CreateOrOverwrite" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200|202)
              echo "Deployed successfully to DEV!"
              echo "Import ID: $(echo $BODY | jq -r '.id')"
              ;;
            *)
              echo "❌ DEV Deploy failed - Status: $HTTP_STATUS"
              exit 1
              ;;
          esac

  # ─────────────────────────────
  # JOB 2: DEPLOY TO UAT
  # merge dev to main → approval gate
  # ─────────────────────────────
  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify UAT Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Cannot access UAT workspace - Status: $HTTP_STATUS"
            exit 1
          fi

          echo "Workspace accessible: $(echo $BODY | jq -r '.name')"

      - name: Check PBIX File
        run: |
          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo " PBIX file not found"
            exit 1
          fi
          echo " PBIX file found"

      - name: Deploy to UAT
        run: |
          echo "=== Deploying to UAT ==="

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/imports?datasetDisplayName=CustomerSuccessReport&nameConflict=CreateOrOverwrite" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200|202)
              echo "Deployed successfully to UAT!"
              echo "Import ID: $(echo $BODY | jq -r '.id')"
              ;;
            *)
              echo " UAT Deploy failed - Status: $HTTP_STATUS"
              exit 1
              ;;
          esac

  # ─────────────────────────────
  # JOB 3: DEPLOY TO PRD
  # only after UAT succeeds
  # requires approval gate
  # ─────────────────────────────
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd
    needs: deploy-uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify PRD Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.PRD_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo " Cannot access PRD workspace - Status: $HTTP_STATUS"
            exit 1
          fi

          echo "Workspace accessible: $(echo $BODY | jq -r '.name')"

      - name: Check PBIX File
        run: |
          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo "❌ PBIX file not found"
            exit 1
          fi
          echo " PBIX file found"

      - name: Deploy to PRD
        run: |
          echo "=== Deploying to PRD ==="

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.PRD_WORKSPACE_ID }}/imports?datasetDisplayName=CustomerSuccessReport&nameConflict=CreateOrOverwrite" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200|202)
              echo " Deployed successfully to PRD!"
              echo "Import ID: $(echo $BODY | jq -r '.id')"
              ;;
            *)
              echo " PRD Deploy failed - Status: $HTTP_STATUS"
              exit 1
              ;;
          esac