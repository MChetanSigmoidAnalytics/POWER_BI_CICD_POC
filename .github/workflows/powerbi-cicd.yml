name: Power BI CI/CD Pipeline - DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    env:
      WORKSPACE_ID:    ${{ secrets.DEV_WORKSPACE_ID }}
      TARGET_SERVER:   ${{ secrets.DEV_SQL_SERVER }}
      TARGET_DATABASE: ${{ secrets.DEV_DATABASE }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update -q && sudo apt-get install -y -q jq

      - name: Get Power BI Access Token
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CLIENT_ID }}" \
            -d "scope=https://analysis.windows.net/powerbi/api/.default" \
            -d "client_secret=${{ secrets.CLIENT_SECRET }}" \
            -d "grant_type=client_credentials")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "❌ Failed to generate token"
            echo "$RESPONSE"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "✅ Token generated successfully"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy Reports to DEV
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "🚀 Deploying all PBIX reports to DEV..."

          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              REPORT_NAME=$(basename "$file" .pbix)
              echo "-------------------------------------"
              echo "📦 Deploying: $REPORT_NAME"
              echo "-------------------------------------"

              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$REPORT_NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")

              STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

              if [[ "$STATUS" == "200" || "$STATUS" == "202" ]]; then
                echo "✅ Deployed: $REPORT_NAME"
              else
                echo "❌ Failed: $REPORT_NAME - Status: $STATUS"
                echo "$RESPONSE"
                exit 1
              fi
            fi
          done

      - name: Wait for Power BI Propagation
        run: |
          echo "⏳ Waiting 30s for Power BI propagation..."
          sleep 30

      - name: Discover Gateway
        id: gateway
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "🔍 Checking for gateways..."

          GATEWAY_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $TOKEN" \
            "https://api.powerbi.com/v1.0/myorg/gateways")

          GATEWAY_ID=$(echo "$GATEWAY_RESPONSE" | jq -r '.value[0].id')

          if [ -z "$GATEWAY_ID" ] || [ "$GATEWAY_ID" = "null" ]; then
            echo "⚠️ No gateway found - cloud datasource, skipping binding"
            echo "gateway_id=" >> $GITHUB_OUTPUT
            echo "datasource_id=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ Gateway found: $GATEWAY_ID"

          DATASOURCE_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $TOKEN" \
            "https://api.powerbi.com/v1.0/myorg/gateways/$GATEWAY_ID/datasources")

          DATASOURCE_ID=$(echo "$DATASOURCE_RESPONSE" | jq -r \
            --arg SERVER "$TARGET_SERVER" \
            --arg DATABASE "$TARGET_DATABASE" \
            '.value[] | select(.connectionDetails.server==$SERVER and .connectionDetails.database==$DATABASE) | .id' \
            | head -n 1)

          if [ -z "$DATASOURCE_ID" ] || [ "$DATASOURCE_ID" = "null" ]; then
            echo "⚠️ Datasource not found - skipping binding"
            echo "gateway_id=" >> $GITHUB_OUTPUT
            echo "datasource_id=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ Datasource found: $DATASOURCE_ID"
          echo "gateway_id=$GATEWAY_ID" >> $GITHUB_OUTPUT
          echo "datasource_id=$DATASOURCE_ID" >> $GITHUB_OUTPUT

      - name: Process Datasets - Takeover, Bind, Refresh
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          GATEWAY_ID="${{ steps.gateway.outputs.gateway_id }}"
          DATASOURCE_ID="${{ steps.gateway.outputs.datasource_id }}"

          echo "🔧 Processing all datasets..."

          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              REPORT_NAME=$(basename "$file" .pbix)
              echo "-------------------------------------"
              echo "⚙️  Processing: $REPORT_NAME"
              echo "-------------------------------------"

              DATASET_ID=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
                jq -r --arg NAME "$REPORT_NAME" \
                '.value[] | select(.name==$NAME) | .id' | head -n 1)

              if [ -z "$DATASET_ID" ] || [ "$DATASET_ID" = "null" ]; then
                echo "❌ Dataset not found: $REPORT_NAME"
                continue
              fi

              echo "✅ Dataset ID: $DATASET_ID"

              # Takeover
              echo "🔑 Taking ownership..."
              curl -s -o /dev/null \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Length: 0"
              sleep 10

              # Gateway bind
              if [ -n "$GATEWAY_ID" ] && [ -n "$DATASOURCE_ID" ]; then
                echo "🔗 Binding to gateway..."
                BIND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X POST \
                  "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "gatewayObjectId": "'"$GATEWAY_ID"'",
                    "datasourceObjectIds": ["'"$DATASOURCE_ID"'"]
                  }')

                if [ "$BIND_STATUS" = "200" ]; then
                  echo "✅ Gateway bound"
                else
                  echo "⚠️ Gateway bind status: $BIND_STATUS"
                fi
                sleep 10
              else
                echo "⚠️ Skipping gateway binding - cloud datasource"
              fi

              # Refresh
              echo "🔄 Triggering refresh..."
              REFRESH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"notifyOption":"NoNotification"}')

              if [ "$REFRESH_STATUS" = "202" ]; then
                echo "✅ Refresh triggered: $REPORT_NAME"
              else
                echo "⚠️ Refresh status: $REFRESH_STATUS"
              fi

              echo "✅ Done: $REPORT_NAME"
            fi
          done

      - name: Pipeline Complete
        run: echo "🎉 DEV deployment completed successfully"