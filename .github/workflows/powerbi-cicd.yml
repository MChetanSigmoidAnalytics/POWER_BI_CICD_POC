name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1: DEPLOY TO DEV
  # ─────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/dev'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify DEV Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.DEV_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cannot access DEV workspace"
            exit 1
          fi
          echo "::notice::Workspace verified: $(echo $BODY | jq -r '.name')"

      - name: Check PBIX Files
        run: |
          for file in \
            "reports/customer_sucess_report.pbix" \
            "reports/Sales_Report_01.pbix" \
            "reports/Sales_Report.pbix" \
            "reports/shippment_report.pbix"
          do
            if [ ! -f "$file" ]; then
              echo "::error::File not found: $file"
              exit 1
            fi
            echo "::notice::Found: $file"
          done

      - name: Deploy All Reports to DEV
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"
          
          deploy_report() {
            local FILE=$1
            local NAME=$2
            echo "=== Deploying $NAME ==="
            RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$FILE")
            HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
            BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')
            case $HTTP_STATUS in
              200|202) echo "::notice::$NAME deployed successfully" ;;
              *) echo "::error::$NAME deploy failed - Status: $HTTP_STATUS"; exit 1 ;;
            esac
          }
          
          deploy_report "reports/customer_sucess_report.pbix"  "CustomerSuccessReport"
          deploy_report "reports/Sales_Report_01.pbix"         "SalesReport01"
          deploy_report "reports/Sales_Report.pbix"            "SalesReport"
          deploy_report "reports/shippment_report.pbix"        "ShippmentReport"

      - name: Update Parameters & Bind Connector
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"
          
          # Lookup Connection ID by Name
          CONNECTION_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.fabric.microsoft.com/v1/connections" | \
            jq -r --arg name "${{ secrets.CONNECTOR_NAME }}" '.value[] | select(.displayName==$name) | .id')
          
          if [ -z "$CONNECTION_ID" ]; then
            echo "::error::Connector not found: ${{ secrets.CONNECTOR_NAME }}"
            exit 1
          fi
          echo "::notice::Connector resolved: ${{ secrets.CONNECTOR_NAME }} → $CONNECTION_ID"

          process_report() {
            local NAME=$1
            
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            
            if [ -z "$DATASET_ID" ]; then
              echo "::error::Dataset not found: $NAME"
              exit 1
            fi
            
            echo "::notice::Processing: $NAME ($DATASET_ID)"
            echo "::warning::Skipping parameter update (known issue after deployment)"

            # TakeOver
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            # Bind to Fabric Cloud Connection
            echo "::notice::Binding $NAME to cloud connector..."
            
            BIND_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "gatewayObjectId": "00000000-0000-0000-0000-000000000000",
                "datasourceObjectIds": ["'"$CONNECTION_ID"'"]
              }')
            
            BIND_STATUS=$(echo "$BIND_RESPONSE" | grep "HTTP_STATUS:" | sed 's/HTTP_STATUS://')
            BODY=$(echo "$BIND_RESPONSE" | sed '/HTTP_STATUS:/d')
            
            if [ "$BIND_STATUS" = "200" ] || [ "$BIND_STATUS" = "202" ]; then
              echo "::notice::$NAME → Connector bound successfully"
            else
              echo "::error::$NAME → Binding failed - Status: $BIND_STATUS"
              echo "$BODY"
              exit 1
            fi

            # Trigger Refresh
            echo "::notice::Triggering refresh for $NAME..."
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'
          }

          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"

  # ─────────────────────────────
  # JOB 2: DEPLOY TO UAT
  # ─────────────────────────────
  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v3
      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      # (You can keep your existing Verify + Check PBIX + Deploy steps)
      # For brevity, I'm showing only the important updated part below.
      # Replace your old "Update Parameters & Bind Connector" with this:

      - name: Update Parameters & Bind Connector
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.UAT_WORKSPACE_ID }}"
          
          CONNECTION_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.fabric.microsoft.com/v1/connections" | \
            jq -r --arg name "${{ secrets.CONNECTOR_NAME }}" '.value[] | select(.displayName==$name) | .id')
          
          if [ -z "$CONNECTION_ID" ]; then
            echo "::error::Connector not found"
            exit 1
          fi
          echo "::notice::Connector resolved → $CONNECTION_ID"

          process_report() {
            local NAME=$1
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            
            if [ -z "$DATASET_ID" ]; then
              echo "::error::Dataset not found: $NAME"
              exit 1
            fi
            
            echo "::notice::Processing: $NAME"
            echo "::warning::Skipping parameter update"

            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            BIND_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "gatewayObjectId": "00000000-0000-0000-0000-000000000000",
                "datasourceObjectIds": ["'"$CONNECTION_ID"'"]
              }')
            
            BIND_STATUS=$(echo "$BIND_RESPONSE" | grep "HTTP_STATUS:" | sed 's/HTTP_STATUS://')
            if [ "$BIND_STATUS" = "200" ] || [ "$BIND_STATUS" = "202" ]; then
              echo "::notice::$NAME → Connector bound successfully"
            else
              echo "::error::$NAME → Binding failed - Status: $BIND_STATUS"
              exit 1
            fi

            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'
          }

          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"

  # ─────────────────────────────
  # JOB 3: DEPLOY TO PRD
  # ─────────────────────────────
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd
    needs: deploy-uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v3
      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      # ... (same Verify, Check Files, Deploy steps as above)

      - name: Update Parameters & Bind Connector
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.PRD_WORKSPACE_ID }}"
          
          CONNECTION_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.fabric.microsoft.com/v1/connections" | \
            jq -r --arg name "${{ secrets.CONNECTOR_NAME }}" '.value[] | select(.displayName==$name) | .id')
          
          if [ -z "$CONNECTION_ID" ]; then
            echo "::error::Connector not found"
            exit 1
          fi

          process_report() {
            local NAME=$1
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            
            if [ -z "$DATASET_ID" ]; then echo "::error::Dataset not found: $NAME"; exit 1; fi
            
            echo "::notice::Processing: $NAME"
            
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            BIND_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "gatewayObjectId": "00000000-0000-0000-0000-000000000000",
                "datasourceObjectIds": ["'"$CONNECTION_ID"'"]
              }')
            
            BIND_STATUS=$(echo "$BIND_RESPONSE" | grep "HTTP_STATUS:" | sed 's/HTTP_STATUS://')
            if [ "$BIND_STATUS" = "200" ] || [ "$BIND_STATUS" = "202" ]; then
              echo "::notice::$NAME → Connector bound successfully"
            else
              echo "::error::$NAME → Binding failed"
              exit 1
            fi

            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'
          }

          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"