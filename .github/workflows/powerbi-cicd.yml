```yaml
deploy-dev:
  runs-on: ubuntu-latest
  environment: dev

  if: github.ref == 'refs/heads/dev'

  env:
    TENANT_ID:     ${{ secrets.TENANT_ID }}
    CLIENT_ID:     ${{ secrets.CLIENT_ID }}
    CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

  steps:
    - uses: actions/checkout@v4

    - name: Get Token
      id: auth
      uses: ./.github/actions/get-token

    - name: Deploy + Bind + Refresh
      run: |
        TOKEN="${{ steps.auth.outputs.token }}"
        WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"
        DATASOURCE_NAME="dev_database_connector"

        echo "======================================"
        echo "GETTING GATEWAYS"
        echo "======================================"

        GATEWAYS=$(curl -s \
          -H "Authorization: Bearer $TOKEN" \
          "https://api.powerbi.com/v1.0/myorg/gateways")

        echo "$GATEWAYS" | jq .

        GATEWAY_ID=$(echo "$GATEWAYS" | jq -r '.value[0].id')

        if [ -z "$GATEWAY_ID" ] || [ "$GATEWAY_ID" == "null" ]; then
          echo "::error::No gateway found"
          exit 1
        fi

        echo "Gateway ID: $GATEWAY_ID"

        echo "======================================"
        echo "GETTING DATASOURCES"
        echo "======================================"

        DATASOURCES=$(curl -s \
          -H "Authorization: Bearer $TOKEN" \
          "https://api.powerbi.com/v1.0/myorg/gateways/$GATEWAY_ID/datasources")

        echo "$DATASOURCES" | jq .

        DATASOURCE_ID=$(echo "$DATASOURCES" | jq -r \
          --arg NAME "$DATASOURCE_NAME" \
          '.value[] | select(.datasourceName==$NAME) | .id')

        if [ -z "$DATASOURCE_ID" ] || [ "$DATASOURCE_ID" == "null" ]; then
          echo "::error::Datasource not found: $DATASOURCE_NAME"
          exit 1
        fi

        echo "Datasource ID: $DATASOURCE_ID"

        echo "======================================"
        echo "DEPLOYING REPORTS"
        echo "======================================"

        for file in reports/*.pbix; do

          if [ -f "$file" ]; then

            NAME=$(basename "$file" .pbix)

            echo ""
            echo "======================================"
            echo "DEPLOYING: $NAME"
            echo "======================================"

            RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
              -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@$file")

            HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')

            if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "202" ]]; then
              echo "::error::Deployment failed for $NAME"
              exit 1
            fi

            echo "::notice::Deployment successful for $NAME"

            echo "Waiting for dataset creation..."
            sleep 40

            echo "======================================"
            echo "GETTING DATASET"
            echo "======================================"

            DATASETS=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets")

            echo "$DATASETS" | jq .

            DATASET_ID=$(echo "$DATASETS" | jq -r \
              --arg NAME "$NAME" \
              '.value[] | select(.name==$NAME) | .id')

            if [ -z "$DATASET_ID" ] || [ "$DATASET_ID" == "null" ]; then
              echo "::error::Dataset not found for $NAME"
              exit 1
            fi

            echo "Dataset ID: $DATASET_ID"

            echo "======================================"
            echo "TAKEOVER DATASET"
            echo "======================================"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            echo "::notice::TakeOver completed"

            echo "======================================"
            echo "BINDING GATEWAY"
            echo "======================================"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                    \"gatewayObjectId\": \"$GATEWAY_ID\",
                    \"datasourceObjectIds\": [\"$DATASOURCE_ID\"]
                  }"

            echo "::notice::Gateway binding completed"

            echo "======================================"
            echo "TRIGGERING REFRESH"
            echo "======================================"

            curl -s -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                    "notifyOption": "NoNotification"
                  }'

            echo "::notice::Refresh triggered for $NAME"

            echo "======================================"
            echo "COMPLETED: $NAME"
            echo "======================================"

          fi

        done
```
