
name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

  workflow_dispatch:

jobs:

  # =========================================================
  # DEV DEPLOYMENT
  # =========================================================

  deploy-dev:
    runs-on: ubuntu-latest

    environment: dev

    if: github.ref == 'refs/heads/dev'

    env:
      TENANT_ID: ${{ secrets.TENANT_ID }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Access Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy Reports To DEV
        run: |

          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"

          SERVER_NAME="${{ secrets.DEV_DB_SERVER }}"
          DATABASE_NAME="${{ secrets.DEV_DB_NAME }}"

          echo "========================================"
          echo "STARTING DEV DEPLOYMENT"
          echo "========================================"

          for file in reports/*.pbix; do

            if [ -f "$file" ]; then

              NAME=$(basename "$file" .pbix)

              echo ""
              echo "========================================"
              echo "DEPLOYING DEV REPORT: $NAME"
              echo "========================================"

              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')

              if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "202" ]]; then
                echo "::error::DEV deployment failed for $NAME"
                exit 1
              fi

              echo "::notice::DEV deployment successful for $NAME"

              echo "Waiting for dataset creation..."
              sleep 40

              DATASET_ID=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
                jq -r --arg NAME "$NAME" \
                '.value[] | select(.name==$NAME) | .id')

              echo "Dataset ID: $DATASET_ID"

              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                      \"updateDetails\": [
                        {
                          \"name\": \"ServerName\",
                          \"newValue\": \"$SERVER_NAME\"
                        },
                        {
                          \"name\": \"DatabaseName\",
                          \"newValue\": \"$DATABASE_NAME\"
                        }
                      ]
                    }"

              echo "::notice::DEV parameters updated"

              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"notifyOption":"NoNotification"}'

              echo "::notice::DEV refresh triggered for $NAME"

            fi

          done



  # =========================================================
  # UAT DEPLOYMENT
  # =========================================================

  deploy-uat:
    runs-on: ubuntu-latest

    environment: uat

    if: github.ref == 'refs/heads/main'

    env:
      TENANT_ID: ${{ secrets.TENANT_ID }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Access Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy Reports To UAT
        run: |

          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.UAT_WORKSPACE_ID }}"

          SERVER_NAME="${{ secrets.UAT_DB_SERVER }}"
          DATABASE_NAME="${{ secrets.UAT_DB_NAME }}"

          echo "========================================"
          echo "STARTING UAT DEPLOYMENT"
          echo "========================================"

          for file in reports/*.pbix; do

            if [ -f "$file" ]; then

              NAME=$(basename "$file" .pbix)

              echo ""
              echo "========================================"
              echo "DEPLOYING UAT REPORT: $NAME"
              echo "========================================"

              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')

              if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "202" ]]; then
                echo "::error::UAT deployment failed for $NAME"
                exit 1
              fi

              echo "::notice::UAT deployment successful for $NAME"

              echo "Waiting for dataset creation..."
              sleep 40

              DATASET_ID=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
                jq -r --arg NAME "$NAME" \
                '.value[] | select(.name==$NAME) | .id')

              echo "Dataset ID: $DATASET_ID"

              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                      \"updateDetails\": [
                        {
                          \"name\": \"ServerName\",
                          \"newValue\": \"$SERVER_NAME\"
                        },
                        {
                          \"name\": \"DatabaseName\",
                          \"newValue\": \"$DATABASE_NAME\"
                        }
                      ]
                    }"

              echo "::notice::UAT parameters updated"

              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"notifyOption":"NoNotification"}'

              echo "::notice::UAT refresh triggered for $NAME"

            fi

          done



  # =========================================================
  # PRD DEPLOYMENT
  # =========================================================

  deploy-prd:
    runs-on: ubuntu-latest

    environment: prd

    needs: deploy-uat

    if: github.ref == 'refs/heads/main'

    env:
      TENANT_ID: ${{ secrets.TENANT_ID }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Access Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy Reports To PRD
        run: |

          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.PRD_WORKSPACE_ID }}"

          SERVER_NAME="${{ secrets.PRD_DB_SERVER }}"
          DATABASE_NAME="${{ secrets.PRD_DB_NAME }}"

          echo "========================================"
          echo "STARTING PRD DEPLOYMENT"
          echo "========================================"

          for file in reports/*.pbix; do

            if [ -f "$file" ]; then

              NAME=$(basename "$file" .pbix)

              echo ""
              echo "========================================"
              echo "DEPLOYING PRD REPORT: $NAME"
              echo "========================================"

              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')

              if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "202" ]]; then
                echo "::error::PRD deployment failed for $NAME"
                exit 1
              fi

              echo "::notice::PRD deployment successful for $NAME"

              echo "Waiting for dataset creation..."
              sleep 40

              DATASET_ID=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
                jq -r --arg NAME "$NAME" \
                '.value[] | select(.name==$NAME) | .id')

              echo "Dataset ID: $DATASET_ID"

              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                      \"updateDetails\": [
                        {
                          \"name\": \"ServerName\",
                          \"newValue\": \"$SERVER_NAME\"
                        },
                        {
                          \"name\": \"DatabaseName\",
                          \"newValue\": \"$DATABASE_NAME\"
                        }
                      ]
                    }"

              echo "::notice::PRD parameters updated"

              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"notifyOption":"NoNotification"}'

              echo "::notice::PRD refresh triggered for $NAME"

            fi

          done
