name: Power BI CI/CD - UAT & PRD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1: DEPLOY TO UAT
  # ─────────────────────────────
  deploy-uat:
    runs-on: ubuntu-latest
    environment: UAT
    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get Token
        run: |
          TOKEN=$(curl -s -X POST \
            https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CLIENT_ID }}&client_secret=${{ secrets.CLIENT_SECRET }}&grant_type=client_credentials&scope=https://analysis.windows.net/powerbi/api/.default" | jq -r '.access_token')

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Token fetch failed"
            exit 1
          fi

          echo "✅ Token fetched successfully"
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Verify UAT Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Cannot access UAT workspace - Status: $HTTP_STATUS"
            exit 1
          fi

          WORKSPACE_NAME=$(echo "$BODY" | jq -r '.name')
          echo "✅ Workspace accessible: $WORKSPACE_NAME"

      - name: Check PBIX File
        run: |
          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo "❌ File not found"
            exit 1
          fi
          echo "✅ PBIX file found"

      - name: Deploy to UAT
        run: |
          echo "=== Deploying to UAT ==="

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/imports?datasetDisplayName=CustomerSuccessReport&nameConflict=CreateOrOverwrite" \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200|202)
              IMPORT_ID=$(echo "$BODY" | jq -r '.id')
              echo "✅ Deployed successfully to UAT!"
              echo "Import ID: $IMPORT_ID"
              ;;
            *)
              echo "❌ UAT Deploy failed - Status: $HTTP_STATUS"
              exit 1
              ;;
          esac

  # ─────────────────────────────
  # JOB 2: DEPLOY TO PRD
  # ─────────────────────────────
  deploy-prd:
    runs-on: ubuntu-latest
    environment: PRD          # ← approval gate triggers here
    needs: deploy-uat         # ← UAT must pass first
    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get Token
        run: |
          TOKEN=$(curl -s -X POST \
            https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CLIENT_ID }}&client_secret=${{ secrets.CLIENT_SECRET }}&grant_type=client_credentials&scope=https://analysis.windows.net/powerbi/api/.default" | jq -r '.access_token')

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Token fetch failed"
            exit 1
          fi

          echo "✅ Token fetched successfully"
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Verify PRD Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.PRD_WORKSPACE_ID }}" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Cannot access PRD workspace - Status: $HTTP_STATUS"
            exit 1
          fi

          WORKSPACE_NAME=$(echo "$BODY" | jq -r '.name')
          echo "✅ Workspace accessible: $WORKSPACE_NAME"

      - name: Check PBIX File
        run: |
          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo "❌ File not found"
            exit 1
          fi
          echo "✅ PBIX file found"

      - name: Deploy to PRD
        run: |
          echo "=== Deploying to PRD ==="

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.PRD_WORKSPACE_ID }}/imports?datasetDisplayName=CustomerSuccessReport&nameConflict=CreateOrOverwrite" \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200|202)
              IMPORT_ID=$(echo "$BODY" | jq -r '.id')
              echo "✅ Deployed successfully to PRD!"
              echo "Import ID: $IMPORT_ID"
              ;;
            *)
              echo "❌ PRD Deploy failed - Status: $HTTP_STATUS"
              exit 1
              ;;
          esac