name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1: DEPLOY TO DEV
  # push to dev → auto deploy
  # no approval needed
  # ─────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/dev'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify DEV Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.DEV_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cannot access DEV workspace - Status: $HTTP_STATUS"
            exit 1
          fi

          # only print workspace name not full response
          WORKSPACE=$(echo $BODY | jq -r '.name')
          echo "::notice::DEV Workspace verified: $WORKSPACE"

      - name: Check PBIX File
        run: |
          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo "::error::PBIX file not found at reports/customer_sucess_report.pbix"
            exit 1
          fi
          echo "::notice::PBIX file verified"

      - name: Deploy to DEV
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.DEV_WORKSPACE_ID }}/imports?datasetDisplayName=CustomerSuccessReport&nameConflict=CreateOrOverwrite" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          case $HTTP_STATUS in
            200|202)
              # only print import ID not full response
              IMPORT_ID=$(echo $BODY | jq -r '.id')
              echo "::notice::DEV deployment successful - Import ID: $IMPORT_ID"
              ;;
            *)
              echo "::error::DEV deployment failed - Status: $HTTP_STATUS"
              exit 1
              ;;
          esac

  # ─────────────────────────────
  # JOB 2: DEPLOY TO UAT
  # merge dev to main → approval gate
  # ─────────────────────────────
  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify UAT Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cannot access UAT workspace - Status: $HTTP_STATUS"
            exit 1
          fi

          WORKSPACE=$(echo $BODY | jq -r '.name')
          echo "::notice::UAT Workspace verified: $WORKSPACE"

      - name: Check PBIX File
        run: |
          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo "::error::PBIX file not found at reports/customer_sucess_report.pbix"
            exit 1
          fi
          echo "::notice::PBIX file verified"

      - name: Deploy to UAT
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/imports?datasetDisplayName=CustomerSuccessReport&nameConflict=CreateOrOverwrite" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          case $HTTP_STATUS in
            200|202)
              IMPORT_ID=$(echo $BODY | jq -r '.id')
              echo "::notice::UAT deployment successful - Import ID: $IMPORT_ID"
              ;;
            *)
              echo "::error::UAT deployment failed - Status: $HTTP_STATUS"
              exit 1
              ;;
          esac

  # ─────────────────────────────
  # JOB 3: DEPLOY TO PRD
  # only after UAT succeeds
  # requires approval gate
  # ─────────────────────────────
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd
    needs: deploy-uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v3

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Verify PRD Workspace Access
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.PRD_WORKSPACE_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cannot access PRD workspace - Status: $HTTP_STATUS"
            exit 1
          fi

          WORKSPACE=$(echo $BODY | jq -r '.name')
          echo "::notice::PRD Workspace verified: $WORKSPACE"

      - name: Check PBIX File
        run: |
          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo "::error::PBIX file not found at reports/customer_sucess_report.pbix"
            exit 1
          fi
          echo "::notice::PBIX file verified"

      - name: Deploy to PRD
        run: |
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.PRD_WORKSPACE_ID }}/imports?datasetDisplayName=CustomerSuccessReport&nameConflict=CreateOrOverwrite" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          case $HTTP_STATUS in
            200|202)
              IMPORT_ID=$(echo $BODY | jq -r '.id')
              echo "::notice::PRD deployment successful - Import ID: $IMPORT_ID"
              ;;
            *)
              echo "::error::PRD deployment failed - Status: $HTTP_STATUS"
              exit 1
              ;;
          esac