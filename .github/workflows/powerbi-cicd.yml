            }')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          case $HTTP_STATUS in
            200) echo "::notice::Parameters updated successfully" ;;
            *) echo "::error::Parameter update failed - Status: $HTTP_STATUS"; exit 1 ;;
          esac

      - name: Takeover Datasource
        run: |
          curl -s -X POST \
            "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/datasets/$DATASET_ID/Default.TakeOver" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}"
          echo "::notice::Datasource takeover complete"

      - name: Lookup and Bind Connector
        run: |
          CONNECTIONS=$(curl -s \
            -X GET "https://api.fabric.microsoft.com/v1/connections" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          CONNECTION_ID=$(echo $CONNECTIONS | jq -r \
            --arg name "${{ secrets.CONNECTOR_NAME }}" \
