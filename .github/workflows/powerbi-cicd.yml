name: Power BI CI/CD Pipeline - DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    env:
      WORKSPACE_ID:  ${{ secrets.DEV_WORKSPACE_ID }}
      CONNECTION_ID: ${{ secrets.DEV_CONNECTION_ID }}

    steps:
      - name: Checkout Code
        run: |
          git clone --depth 1 --branch ${{ github.ref_name }} \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" .

      - name: Get Token (Direct)
        id: auth
        run: |
          echo "🔐 Fetching Access Token..."

          RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CLIENT_ID }}" \
            -d "scope=https://api.fabric.microsoft.com/.default" \
            -d "client_secret=${{ secrets.CLIENT_SECRET }}" \
            -d "grant_type=client_credentials")

          if echo "$RESPONSE" | jq -e '.access_token' > /dev/null 2>&1; then
            TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
            echo "✅ Token acquired successfully"
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
          else
            echo "❌ Token fetch FAILED"
            echo "Response: $RESPONSE"
            echo "Please check:"
            echo "1. CLIENT_ID, CLIENT_SECRET, TENANT_ID are correct"
            echo "2. App has correct API permissions (Dataset.ReadWrite.All, Workspace.ReadWrite.All, etc.)"
            echo "3. Admin consent is granted"
            exit 1
          fi

      - name: Deploy All Reports to DEV
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "🚀 Deploying all reports..."

          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file" .pbix)
              echo "Deploying: $NAME"
              
              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
              
              if [[ "$HTTP_STATUS" == 200 || "$HTTP_STATUS" == 202 ]]; then
                echo "::notice::✅ $NAME deployed"
              else
                echo "::error::❌ $NAME deployment failed"
              fi
            fi
          done

      - name: TakeOver + Bind + Refresh
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          CONNECTION_ID="${{ secrets.DEV_CONNECTION_ID }}"

          process_report() {
            local NAME=$1
            echo "🔧 Processing: $NAME"

            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')

            if [ -z "$DATASET_ID" ]; then
              echo "::warning::Dataset not found: $NAME"
              return
            fi

            # TakeOver
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Length: 0"

            # Bind
            if [ -n "$CONNECTION_ID" ]; then
              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{
                  "gatewayObjectId": "00000000-0000-0000-0000-000000000000",
                  "datasourceObjectIds": ["'"$CONNECTION_ID"'"]
                }'
            fi

            # Refresh
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'

            echo "::notice::✅ $NAME processed"
          }

          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"