name: Power BI CI/CD - UAT Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-uat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get Token & Deploy to UAT
        run: |
          echo "──────────────────────────────────"
          echo "Step 1: Fetching token from Azure AD..."
          echo "──────────────────────────────────"

          TOKEN=$(curl -s -X POST \
            https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CLIENT_ID }}&client_secret=${{ secrets.CLIENT_SECRET }}&grant_type=client_credentials&scope=https://analysis.windows.net/powerbi/api/.default" | jq -r '.access_token')

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Token fetch failed"
            exit 1
          fi
          echo "✅ Token fetched successfully"

          echo "──────────────────────────────────"
          echo "Step 2: Deploying to UAT workspace..."
          echo "──────────────────────────────────"

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/imports?datasetDisplayName=SalesReport&nameConflict=Overwrite" \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@reports/sales-report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY" | jq . 2>/dev/null || echo "$BODY"

          echo "──────────────────────────────────"
          case $HTTP_STATUS in
            200|202)
              echo "✅ Successfully deployed to UAT!"
              ;;
            401)
              echo "❌ HTTP 401 - Unauthorized"
              exit 1
              ;;
            403)
              echo "❌ HTTP 403 - SP has no access to UAT workspace"
              exit 1
              ;;
            404)
              echo "❌ HTTP 404 - Workspace ID wrong or pbix file not found"
              exit 1
              ;;
            *)
              echo "❌ Unexpected status: $HTTP_STATUS"
              exit 1
              ;;
          esac