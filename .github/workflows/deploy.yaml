name: Power BI CI/CD - UAT Deploy-Auth Testing 

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-uat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get Token
        run: |
          TOKEN=$(curl -s -X POST \
            https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CLIENT_ID }}&client_secret=${{ secrets.CLIENT_SECRET }}&grant_type=client_credentials&scope=https://analysis.windows.net/powerbi/api/.default" | jq -r '.access_token')

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Token fetch failed"
            exit 1
          fi

          echo "✅ Token fetched - length: ${#TOKEN}"
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Verify Workspace Access
        run: |
          echo "=== Checking SP can see UAT workspace ==="
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200)
              WORKSPACE_NAME=$(echo "$BODY" | jq -r '.name')
              echo "✅ Workspace accessible: $WORKSPACE_NAME"
              ;;
            401)
              echo "❌ 401 - SP has no access to UAT workspace"
              echo "   → Make sure SP is added as Admin/Member in uat_poc"
              exit 1
              ;;
            403)
              echo "❌ 403 - Forbidden"
              echo "   → Power BI Admin portal SP setting not enabled"
              exit 1
              ;;
            404)
              echo "❌ 404 - UAT_WORKSPACE_ID is wrong"
              exit 1
              ;;
          esac

      - name: Check PBIX File
        run: |
          echo "=== Checking pbix file ==="
          find . -name "*.pbix" 2>/dev/null

          if [ ! -f "reports/customer_sucess_report.pbix" ]; then
            echo "❌ reports/*.pbix not found"
            echo "Files in repo:"
            ls -la
            echo "Files in reports/:"
            ls -la reports/ 2>/dev/null || echo "reports/ folder missing"
            exit 1
          fi

          echo "✅ PBIX file found"
          ls -lh reports/sales-report.pbix

      - name: Deploy to UAT
        run: |
          echo "=== Deploying to UAT ==="

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/imports?datasetDisplayName=SalesReport&nameConflict=Overwrite" \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@reports/customer_sucess_report.pbix")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200|202)
              IMPORT_ID=$(echo "$BODY" | jq -r '.id')
              echo "✅ Deployed successfully to UAT!"
              echo "Import ID: $IMPORT_ID"
              ;;
            401)
              echo "❌ 401 - Unauthorized on import"
              echo "   → SP role must be Admin or Member (not Viewer)"
              exit 1
              ;;
            403)
              echo "❌ 403 - Forbidden"
              echo "   → SP does not have import permissions"
              exit 1
              ;;
            404)
              echo "❌ 404 - Workspace not found"
              exit 1
              ;;
            409)
              echo "❌ 409 - Conflict, report already exists"
              echo "   → nameConflict=Overwrite should handle this"
              exit 1
              ;;
            *)
              echo "❌ Unexpected status: $HTTP_STATUS"
              exit 1
              ;;
          esac