
name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

  workflow_dispatch:

jobs:

  # ====================== DEV ======================

  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    if: github.ref == 'refs/heads/dev'

    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy PBIX + Update Parameters + Refresh
        run: |

          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"

          SERVER_NAME="${{ secrets.DB_SERVER }}"
          DATABASE_NAME="${{ secrets.DB_NAME }}"

          echo "========================================"
          echo "STARTING DEV DEPLOYMENT"
          echo "========================================"

          for file in reports/*.pbix; do

            if [ -f "$file" ]; then

              NAME=$(basename "$file" .pbix)

              echo ""
              echo "========================================"
              echo "DEPLOYING: $NAME"
              echo "========================================"

              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')

              if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "202" ]]; then
                echo "::error::Deployment failed for $NAME"
                exit 1
              fi

              echo "::notice::Deployment successful for $NAME"

              echo "Waiting for dataset creation..."
              sleep 40

              echo ""
              echo "========================================"
              echo "FETCHING DATASET"
              echo "========================================"

              DATASETS=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets")

              echo "$DATASETS" | jq .

              DATASET_ID=$(echo "$DATASETS" | jq -r \
                --arg NAME "$NAME" \
                '.value[] | select(.name==$NAME) | .id')

              if [ -z "$DATASET_ID" ] || [ "$DATASET_ID" == "null" ]; then
                echo "::error::Dataset not found for $NAME"
                exit 1
              fi

              echo "Dataset ID: $DATASET_ID"

              echo ""
              echo "========================================"
              echo "UPDATING PARAMETERS"
              echo "========================================"

              PARAM_RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.UpdateParameters" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                      \"updateDetails\": [
                        {
                          \"name\": \"ServerName\",
                          \"newValue\": \"$SERVER_NAME\"
                        },
                        {
                          \"name\": \"DatabaseName\",
                          \"newValue\": \"$DATABASE_NAME\"
                        }
                      ]
                    }")

              PARAM_STATUS=$(echo "$PARAM_RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')

              if [[ "$PARAM_STATUS" != "200" ]]; then
                echo "::error::Parameter update failed for $NAME"
                echo "$PARAM_RESPONSE"
                exit 1
              fi

              echo "::notice::Parameters updated successfully"

              echo ""
              echo "========================================"
              echo "TRIGGERING REFRESH"
              echo "========================================"

              REFRESH_RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{
                      "notifyOption": "NoNotification"
                    }')

              REFRESH_STATUS=$(echo "$REFRESH_RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')

              if [[ "$REFRESH_STATUS" != "202" ]]; then
                echo "::error::Refresh failed for $NAME"
                echo "$REFRESH_RESPONSE"
                exit 1
              fi

              echo "::notice::Refresh triggered successfully for $NAME"

              echo ""
              echo "========================================"
              echo "COMPLETED: $NAME"
              echo "========================================"

            fi

          done

