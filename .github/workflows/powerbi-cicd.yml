name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  # ====================== DEPLOY TO DEV ======================
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/dev'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: 🔍 List All Connections
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "=== ALL CONNECTIONS ==="
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.fabric.microsoft.com/v1/connections" | \
            jq -r '.value[] | "Name: \(.displayName) | ID: \(.id)"'

      - name: Deploy All Reports to DEV
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"
          
          echo "🚀 Deploying all reports from reports/ folder..."
          
          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file" .pbix)
              echo "=== Deploying: $NAME ==="
              
              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")
              
              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
              
              if [[ "$HTTP_STATUS" == 200 || "$HTTP_STATUS" == 202 ]]; then
                echo "::notice::✅ $NAME deployed successfully"
              else
                echo "::error::❌ $NAME deploy failed - Status: $HTTP_STATUS"
                exit 1
              fi
            fi
          done

      - name: TakeOver + Refresh All Datasets
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.DEV_WORKSPACE_ID }}"
          
          process_report() {
            local NAME=$1
            echo "🔄 Processing: $NAME"
            
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            
            if [ -z "$DATASET_ID" ]; then
              echo "::warning::Dataset not found: $NAME"
              return
            fi
            
            # TakeOver
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"
            
            # Refresh
            echo "::notice::Triggering refresh for $NAME..."
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'
          }
          
          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"

  # ====================== DEPLOY TO UAT ======================
  deploy-uat:
    runs-on: ubuntu-latest
    environment: uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy All Reports to UAT
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.UAT_WORKSPACE_ID }}"
          
          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file" .pbix)
              echo "=== Deploying: $NAME to UAT ==="
              
              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")
              
              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
              if [[ "$HTTP_STATUS" == 200 || "$HTTP_STATUS" == 202 ]]; then
                echo "::notice::✅ $NAME deployed to UAT"
              else
                echo "::error::❌ $NAME failed - Status: $HTTP_STATUS"
                exit 1
              fi
            fi
          done

      - name: TakeOver + Refresh All Datasets (UAT)
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.UAT_WORKSPACE_ID }}"
          # Same process_report function as DEV (copy-paste for simplicity)
          process_report() {
            local NAME=$1
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            if [ -z "$DATASET_ID" ]; then echo "::warning::Dataset not found: $NAME"; return; fi
            
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"
            
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'
            echo "::notice::Refresh triggered for $NAME in UAT"
          }
          
          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"

  # ====================== DEPLOY TO PRD ======================
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd
    needs: deploy-uat
    if: github.ref == 'refs/heads/main'
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy All Reports to PRD
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.PRD_WORKSPACE_ID }}"
          
          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file" .pbix)
              echo "=== Deploying: $NAME to PRD ==="
              # Same deployment code as UAT...
              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")
              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
              if [[ "$HTTP_STATUS" == 200 || "$HTTP_STATUS" == 202 ]]; then
                echo "::notice::✅ $NAME deployed to PRD"
              else
                echo "::error::❌ $NAME failed in PRD"
                exit 1
              fi
            fi
          done

      - name: TakeOver + Refresh All Datasets (PRD)
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          WORKSPACE_ID="${{ secrets.PRD_WORKSPACE_ID }}"
          # Same process_report as UAT...
          process_report() {
            local NAME=$1
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            if [ -z "$DATASET_ID" ]; then echo "::warning::Dataset not found: $NAME"; return; fi
            
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"
            
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'
            echo "::notice::Refresh triggered for $NAME in PRD"
          }
          
          process_report "CustomerSuccessReport"
          process_report "SalesReport01"
          process_report "SalesReport"
          process_report "ShippmentReport"