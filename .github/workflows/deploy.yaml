name: Power BI Auth Debug

on:
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets Are Set
        run: |
          if [ -z "${{ secrets.TENANT_ID }}" ]; then
            echo "❌ TENANT_ID is missing"; exit 1
          else
            echo "✅ TENANT_ID is set"
          fi
          if [ -z "${{ secrets.CLIENT_ID }}" ]; then
            echo "❌ CLIENT_ID is missing"; exit 1
          else
            echo "✅ CLIENT_ID is set"
          fi
          if [ -z "${{ secrets.CLIENT_SECRET }}" ]; then
            echo "❌ CLIENT_SECRET is missing"; exit 1
          else
            echo "✅ CLIENT_SECRET is set"
          fi

  test-auth:
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch Token and Test Power BI API
        run: |
          echo "──────────────────────────────────"
          echo "Step 1: Fetching token from Azure AD..."
          echo "──────────────────────────────────"

          FULL_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CLIENT_ID }}&client_secret=${{ secrets.CLIENT_SECRET }}&grant_type=client_credentials&scope=https://analysis.windows.net/powerbi/api/.default")

          echo "Azure Raw Response:"
          echo "$FULL_RESPONSE" | jq .

          # Check for azure error
          ERROR=$(echo "$FULL_RESPONSE" | jq -r '.error // empty')
          if [ ! -z "$ERROR" ]; then
            echo "❌ Azure Error: $ERROR"
            echo "❌ $(echo "$FULL_RESPONSE" | jq -r '.error_description')"
            exit 1
          fi

          TOKEN=$(echo "$FULL_RESPONSE" | jq -r '.access_token')

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Token is empty or null"
            exit 1
          fi

          echo "✅ Token fetched successfully"
          echo "Token length: ${#TOKEN}"
          echo "Token preview: ${TOKEN:0:30}..."

          echo "──────────────────────────────────"
          echo "Step 2: Decoding token claims..."
          echo "──────────────────────────────────"

          # Decode JWT payload
          PAYLOAD=$(echo "$TOKEN" | cut -d'.' -f2 | base64 -d 2>/dev/null || echo "decode failed")
          echo "Token claims:"
          echo "$PAYLOAD" | jq . 2>/dev/null || echo "$PAYLOAD"

          echo "──────────────────────────────────"
          echo "Step 3: Calling Power BI API..."
          echo "──────────────────────────────────"

          echo "Token being used: ${TOKEN:0:30}..."

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | grep -v "==HTTP_STATUS==")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response Body:"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          echo "──────────────────────────────────"
          case $HTTP_STATUS in
            200)
              WORKSPACE_COUNT=$(echo "$BODY" | jq '.value | length')
              echo "✅ HTTP 200 - Auth working!"
              echo "✅ Workspaces visible to SP: $WORKSPACE_COUNT"
              ;;
            401)
              echo "❌ HTTP 401 - Unauthorized"
              echo "   Possible reasons:"
              echo "   → CLIENT_SECRET expired in Azure"
              echo "   → Wrong CLIENT_ID or TENANT_ID"
              echo "   → Token audience mismatch"
              exit 1
              ;;
            403)
              echo "❌ HTTP 403 - Forbidden"
              echo "   Possible reasons:"
              echo "   → Admin consent not fully propagated (wait 10 mins)"
              echo "   → Service principal not enabled in Power BI Admin portal"
              exit 1
              ;;
            *)
              echo "❌ Unexpected HTTP status: $HTTP_STATUS"
              exit 1
              ;;
          esac