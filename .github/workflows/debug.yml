name: Debug Dataset Parameters

on:
  branches:
    - dev
  workflow_dispatch:

jobs:
  debug-parameters:
    runs-on: ubuntu-latest
    environment: uat
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get Token
        run: |
          TOKEN=$(curl -s -X POST \
            https://login.microsoftonline.com/${{ secrets.TENANT_ID }}/oauth2/v2.0/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CLIENT_ID }}&client_secret=${{ secrets.CLIENT_SECRET }}&grant_type=client_credentials&scope=https://analysis.windows.net/powerbi/api/.default" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "::error::Token fetch failed"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "::notice::Token fetched successfully"
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Get Dataset ID
        run: |
          echo "=== All Datasets in UAT Workspace ==="
          DATASETS=$(curl -s \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/datasets" \
            -H "Authorization: Bearer $TOKEN")

          echo $DATASETS | jq '.value[] | {name: .name, id: .id}'

          DATASET_ID=$(echo $DATASETS | jq -r \
            '.value[] | select(.name=="CustomerSuccessReport") | .id')

          if [ -z "$DATASET_ID" ]; then
            echo "::error::Dataset not found"
            exit 1
          fi

          echo "::notice::Dataset ID: $DATASET_ID"
          echo "DATASET_ID=$DATASET_ID" >> $GITHUB_ENV

      - name: Check Dataset Parameters
        run: |
          echo "=== Dataset Parameters ==="
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/datasets/$DATASET_ID/parameters" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo $BODY | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200) echo "::notice::Parameters API works ✅" ;;
            404) echo "::notice::Parameters API returned 404 - dataset may not support this" ;;
            *) echo "::notice::Unexpected status: $HTTP_STATUS" ;;
          esac

      - name: Check Dataset Datasources
        run: |
          echo "=== Dataset Datasources ==="
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/datasets/$DATASET_ID/datasources" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo $BODY | jq . 2>/dev/null || echo "$BODY"

      - name: Check Dataset Refresh History
        run: |
          echo "=== Refresh History ==="
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/datasets/$DATASET_ID/refreshes?top=3" \
            -H "Authorization: Bearer $TOKEN")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo $BODY | jq . 2>/dev/null || echo "$BODY"

      - name: Try Update Parameters
        run: |
          echo "=== Testing UpdateParameters API ==="
          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/datasets/$DATASET_ID/Default.UpdateParameters" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "updateDetails": [
                { "name": "ServerName",   "newValue": "${{ secrets.DB_SERVER }}" },
                { "name": "DatabaseName", "newValue": "${{ secrets.DB_NAME }}" }
              ]
            }')

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo $BODY | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200) echo "::notice::UpdateParameters works ✅ - use this in main pipeline" ;;
            400) echo "::notice::400 - Parameter names might be wrong - check names above" ;;
            404) echo "::notice::404 - Dataset not found or API not supported on Premium" ;;
            *) echo "::notice::Status: $HTTP_STATUS" ;;
          esac

      - name: Try Update Datasources
        run: |
          echo "=== Testing UpdateDatasources API ==="

          # Get current datasource details first
          DATASOURCES=$(curl -s \
            -X GET "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/datasets/$DATASET_ID/datasources" \
            -H "Authorization: Bearer $TOKEN")

          GATEWAY_ID=$(echo $DATASOURCES | jq -r '.value[0].gatewayId')
          DATASOURCE_ID=$(echo $DATASOURCES | jq -r '.value[0].datasourceId')

          echo "GatewayId: $GATEWAY_ID"
          echo "DatasourceId: $DATASOURCE_ID"

          RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
            -X POST "https://api.powerbi.com/v1.0/myorg/groups/${{ secrets.UAT_WORKSPACE_ID }}/datasets/$DATASET_ID/Default.UpdateDatasources" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"updateDetails\": [{
                \"datasourceSelector\": {
                  \"datasourceType\": \"Sql\",
                  \"connectionDetails\": {
                    \"server\": \"${{ secrets.DB_SERVER }}\",
                    \"database\": \"${{ secrets.DB_NAME }}\"
                  }
                },
                \"connectionDetails\": {
                  \"server\": \"${{ secrets.DB_SERVER }}\",
                  \"database\": \"${{ secrets.DB_NAME }}\"
                }
              }]
            }")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
          BODY=$(echo "$RESPONSE" | sed '/==HTTP_STATUS==/d')

          echo "HTTP Status: $HTTP_STATUS"
          echo $BODY | jq . 2>/dev/null || echo "$BODY"

          case $HTTP_STATUS in
            200) echo "::notice::UpdateDatasources works ✅ - use this in main pipeline" ;;
            400) echo "::notice::400 - Check datasource type or connection details" ;;
            404) echo "::notice::404 - API not supported" ;;
            *) echo "::notice::Status: $HTTP_STATUS" ;;
          esac