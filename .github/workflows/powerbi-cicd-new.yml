name: Power BI CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  # ====================== GET CONNECTOR IDs ======================
  get-connector-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: 🔍 LIST ALL CONNECTOR IDs (Copy These!)
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "══════════════════════════════════════════════"
          echo "🔹 ALL CLOUD CONNECTIONS - COPY THESE IDs"
          echo "══════════════════════════════════════════════"
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.fabric.microsoft.com/v1/connections" | \
            jq -r '.value[] | "\(.displayName)  →  \(.id)"'
          
          echo ""
          echo "══════════════════════════════════════════════"
          echo "💡 Copy above IDs and create these GitHub Secrets:"
          echo "   DEV_CONNECTION_ID"
          echo "   UAT_CONNECTION_ID"
          echo "   PRD_CONNECTION_ID"
          echo "══════════════════════════════════════════════"

  # ====================== DEPLOY TO DEV ======================
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/dev'
    needs: get-connector-ids
    env:
      WORKSPACE_ID:  ${{ secrets.DEV_WORKSPACE_ID }}
      CONNECTION_ID: ${{ secrets.DEV_CONNECTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Token
        id: auth
        uses: ./.github/actions/get-token

      - name: Deploy Reports to DEV
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          echo "🚀 Deploying all reports to DEV..."

          for file in reports/*.pbix; do
            if [ -f "$file" ]; then
              NAME=$(basename "$file" .pbix)
              echo "Deploying: $NAME"
              
              RESPONSE=$(curl -s -w "\n==HTTP_STATUS==%{http_code}" \
                -X POST "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/imports?datasetDisplayName=$NAME&nameConflict=CreateOrOverwrite" \
                -H "Authorization: Bearer $TOKEN" \
                -F "file=@$file")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "==HTTP_STATUS==" | sed 's/==HTTP_STATUS==//')
              if [[ "$HTTP_STATUS" == 200 || "$HTTP_STATUS" == 202 ]]; then
                echo "::notice::✅ $NAME deployed"
              else
                echo "::error::❌ $NAME failed"
              fi
            fi
          done

      - name: TakeOver + Bind + Refresh (DEV)
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"
          CONNECTION_ID="${{ secrets.DEV_CONNECTION_ID }}"
          
          process_report() {
            local NAME=$1
            echo "🔧 Processing $NAME..."
            
            DATASET_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets" | \
              jq -r --arg n "$NAME" '.value[] | select(.name==$n) | .id')
            
            if [ -z "$DATASET_ID" ]; then
              echo "::warning::Dataset not found: $NAME"
              return
            fi

            # TakeOver
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.TakeOver" \
              -H "Authorization: Bearer $TOKEN"

            # Bind
            if [ -n "$CONNECTION_ID" ]; then
              curl -s -X POST \
                "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/Default.BindToGateway" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{
                  "gatewayObjectId": "00000000-0000-0000-0000-000000000000",
                  "datasourceObjectIds": ["'"$CONNECTION_ID"'"]
                }'
            fi

            # Refresh
            curl -s -o /dev/null -X POST \
              "https://api.powerbi.com/v1.0/myorg/groups/$WORKSPACE_ID/datasets/$DATASET_ID/refreshes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"notifyOption": "NoNotification"}'
            
            echo "::notice::✅ $NAME processed"
          }

         